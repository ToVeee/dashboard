<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>complaint status</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        header {
            background: #800000;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            background: #28a745;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-badge.disconnected {
            background: #dc3545;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            margin-bottom: 15px;
            color: #800000;
        }

        #complaintList {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .complaint-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #ccc;
            animation: slideIn 0.3s ease-out;
        }

        /* Color coding by severity score */
        .severity-low {
            border-left-color: #28a745;
        }

        .severity-medium {
            border-left-color: #ffc107;
        }

        .severity-high {
            border-left-color: #dc3545;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

        .card-name {
            font-weight: bold;
            color: #333;
        }

        .card-body {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .score-tag {
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <h1>Complaint status</h1>
                <p>Real-time School Complaint Monitoring Feed</p>
            </div>
            <div id="status" class="status-badge disconnected">Connecting...</div>
        </header>

        <h2>Live Feed</h2>
        <div id="complaintList">
            <div class="no-data">No complaints received yet. Waiting for live activity...</div>
        </div>
    </div>

    <script>
        // Connect Render server
        const socket = io('https://rekserver.onrender.com');

        const statusBadge = document.getElementById('status');
        const complaintList = document.getElementById('complaintList');

        // Monitor connection status
        socket.on('connect', () => {
            statusBadge.innerText = "🟢 Connected (Live)";
            statusBadge.className = "status-badge";
            console.log("Connected to WebSocket tunnel successfully.");
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "🔴 Disconnected";
            statusBadge.className = "status-badge disconnected";
        });

        // --- CARD ---
        function renderComplaintCard(data) {
            const noDataMessage = document.querySelector('.no-data');
            if (noDataMessage) {
                noDataMessage.remove();
            }

            let severityClass = 'severity-low';
            if (data.score >= 25 && data.score < 40) {
                severityClass = 'severity-medium';
            } else if (data.score >= 40) {
                severityClass = 'severity-high';
            }

           
            function generateComplaintCode() {
                const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                const bytes = new Uint8Array(8);

                crypto.getRandomValues(bytes);

                let id = "";

                for (const b of bytes) {
                    id += chars[b % chars.length];
                }

                return `ER-${id}`;
            }

            
            const complaintId = data.trackingid || data.trackingId;

            // create card
            const card = document.createElement('div');
            card.className = `complaint-card ${severityClass}`;

            card.id = complaintId;

            card.innerHTML = `
        <div class="card-header">
            <span class="card-name">
                ${data.isAnonymous ? '🕵️ Anonymous Student' : '👤 ' + data.name}
            </span>
            <span>📅 ${data.date}</span>
        </div>

        <div class="card-body">
            <p><strong>Tracking ID:</strong> ${complaintId}</p>
<p><strong>Category:</strong> ${data.category}</p>
            <p>${data.text || "<em>No written details provided.</em>"}</p>
        </div>

        <div class="card-footer">
            <span><strong>Section:</strong> ${data.section || 'N/A'}</span>
            <span class="score-tag">Severity Score: ${data.score}</span>
        </div>
    `;

            
            complaintList.insertBefore(card, complaintList.firstChild);
        }
       
        socket.on('newComplaint', (data) => {
            console.log("Received live broadcast data:", data);
            renderComplaintCard(data);
        });

        
        socket.on('complaintHistory', (historyArray) => {
            console.log("Received database history:", historyArray);

            
            complaintList.innerHTML = '';

            
            historyArray.reverse().forEach(complaint => {
                renderComplaintCard(complaint);
            });
        });

        window.addEventListener("load", () => {
            if (window.location.hash) {
                const target = document.querySelector(window.location.hash);

                if (target) {
                    target.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });

                    target.style.outline = "4px solid gold";

                    setTimeout(() => {
                        target.style.outline = "";
                    }, 4000);
                }
            }
        });
    </script>
</body>

</html>
